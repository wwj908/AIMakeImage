server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: make-image-api
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/make_image?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

app:
  jwt-secret: ${APP_JWT_SECRET:change-this-secret-to-at-least-32-characters}
  jwt-expiration-hours: ${APP_JWT_EXPIRATION_HOURS:168}
  storage-dir: ${APP_STORAGE_DIR:storage}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  thumbnail-base-url: ${APP_THUMBNAIL_BASE_URL:}
